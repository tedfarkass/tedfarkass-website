:root {
  --bg:#0d0d0f; --bg-2:#111114; --bg-3:#16161a; --bg-4:#1c1c21;
  --border:rgba(255,255,255,0.07); --border-mid:rgba(255,255,255,0.12);
  --blue:#4d8ef0; --white:#f4f4f6; --grey-1:#a8a8b3; --grey-2:#6b6b78;
  --grey-3:#3a3a44; --text:#e8e8ed; --green:#3ecf6e; --yellow:#f0b429; --red:#e05c5c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;background:rgba(13,13,15,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'KOTH',sans-serif;font-size:1.5rem;color:var(--white);text-decoration:none;letter-spacing:0.05em;transition:color 0.2s;}
.nav-logo span{color:var(--blue);}
.nav-logo:hover{color:var(--blue);}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none;}
.nav-links a{font-size:0.82rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;color:var(--grey-2);transition:color 0.2s;}
.nav-links a:hover{color:var(--white);}
.nav-links a.active{color:var(--blue);}
@media(max-width:680px){.nav-links{display:none;}}
.page{max-width:1200px;margin:0 auto;padding:88px 1.5rem 4rem;}
.back-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--grey-2);text-decoration:none;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;transition:color 0.2s;margin-bottom:1.5rem;}
.back-link:hover{color:var(--blue);}
.page-header{margin-bottom:2.5rem;}
.page-tag{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--blue);margin-bottom:0.4rem;display:block;}
.page-title{font-family:'KOTH',sans-serif;font-size:clamp(2rem,5vw,3rem);color:var(--white);line-height:1.05;margin-bottom:0.4rem;}
.page-sub{font-size:0.9rem;color:var(--grey-2);font-weight:300;max-width:600px;line-height:1.7;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:1.2rem;text-align:center;}
.loading-spinner{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--blue);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:0.78rem;letter-spacing:0.15em;color:var(--grey-2);}
.error-state{padding:2rem;background:rgba(224,92,92,0.06);border:1px solid rgba(224,92,92,0.2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:#e05c5c;line-height:1.7;}
.toolbar{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap input{width:100%;padding:0.65rem 1rem 0.65rem 2.4rem;background:var(--bg-3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
.search-wrap input::placeholder{color:var(--grey-3);}
.search-wrap input:focus{border-color:rgba(77,142,240,0.4);}
.search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--grey-3);font-size:0.9rem;pointer-events:none;}
.filter-btns{display:flex;gap:0.5rem;flex-wrap:wrap;}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.5rem 1rem;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg-3);color:var(--grey-2);transition:all 0.2s;}
.filter-btn:hover{color:var(--white);border-color:var(--border-mid);}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.last-updated{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--grey-3);letter-spacing:0.08em;margin-bottom:1.5rem;}
.last-updated span{color:var(--grey-2);}
.legend{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:0.4rem;font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;color:var(--grey-2);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;}
.set-card{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.25s,transform 0.25s,box-shadow 0.25s;display:flex;flex-direction:column;}
.set-card:hover{border-color:rgba(77,142,240,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.set-card.hidden{display:none;}
.card-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);position:relative;}
.card-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);opacity:0;transition:opacity 0.25s;}
.set-card:hover .card-header::before{opacity:1;}
.set-name{font-family:'KOTH',sans-serif;font-size:1.1rem;color:var(--white);letter-spacing:0.03em;margin-bottom:0.4rem;line-height:1.2;}
.set-most-exp{display:flex;align-items:center;gap:0.4rem;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--grey-2);}
.exp-val{color:var(--yellow);font-weight:500;}
.card-products{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:0.75rem;flex:1;}
.product-row{display:flex;flex-direction:column;gap:0.3rem;}
.product-type-label{font-family:'JetBrains Mono',monospace;font-size:0.63rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey-1);}
.product-type-label.type-play{color:#4d8ef0;}
.product-type-label.type-collector{color:#a78bfa;}
.product-type-label.type-draft{color:#f0b429;}
.product-type-label.type-set{color:#3ecf6e;}
.product-evs{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
.ev-cell{background:var(--bg-4);border-radius:5px;padding:0.5rem 0.75rem;border:1px solid var(--border);display:flex;flex-direction:column;gap:0.1rem;}
.ev-cell-label{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--white);}
.ev-cell-value{font-size:0.95rem;font-weight:600;color:var(--white);}
.ev-cell-value.type-play{color:#4d8ef0;}
.ev-cell-value.type-collector{color:#a78bfa;}
.ev-cell-value.type-draft{color:#f0b429;}
.ev-cell-value.type-set{color:#3ecf6e;}
.product-divider{height:1px;background:var(--border);margin:0.1rem 0;}
.no-results{grid-column:1/-1;text-align:center;padding:4rem 2rem;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--grey-3);letter-spacing:0.1em;}

</style>

function isNumeric(v) { return v !== '' && !isNaN(parseFloat(v.replace(/[$,]/g,''))); }

function safeFloat(v) {
  if (!v && v !== 0) return null;
  const cleaned = String(v).replace(/[$,]/g, '').trim();
  const f = parseFloat(cleaned);
  return isNaN(f) ? null : Math.round(f * 100) / 100;
}

function parseSheets(rows) {
  var sets = [];
  var i = 0;
  while (i < rows.length) {
    var r = rows[i];
    var v1 = (r[1] || '').trim();
    if (v1 && SET_NAME_SKIP.indexOf(v1) === -1 && !isNumeric(v1) && i + 4 < rows.length) {
      var r1 = rows[i+1] || [];
      var r2 = rows[i+2] || [];
      var r3 = rows[i+3] || [];
      var r4 = rows[i+4] || [];
      var mostExp = safeFloat(r3[1]);
      var products = [];
      [2, 3, 4].forEach(function(col) {
        var packLabel = (r1[col] || '').trim();
        var packType  = TYPE_MAP[packLabel];
        var packEv    = safeFloat(r2[col]);
        var boxEv     = safeFloat(r4[col]);
        if (packType) {
          products.push({ type: packType, pack_ev: packEv, box_ev: boxEv });
        }
      });
      sets.push({ name: v1, most_expensive: mostExp, products: products });
      i += 5;
      continue;
    }
    i++;
  }
  return sets;
}

}

function fmtExp(val) {
  if (!val) return 'N/A';
  return '$' + val.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

var activeFilter = 'all';
var searchQuery  = '';

function applyFilters() {
  var cards = document.querySelectorAll('.set-card');
  var visible = 0;
  cards.forEach(function(card) {
    var nameMatch = card.dataset.name.indexOf(searchQuery) !== -1;
    var typeMatch = activeFilter === 'all' || card.dataset.types.indexOf(activeFilter) !== -1;
    var show = nameMatch && typeMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  var noRes = document.querySelector('.no-results');
  if (visible === 0 && !noRes) {
    document.getElementById('setsGrid').insertAdjacentHTML('beforeend',
      '<div class="no-results">NO SETS MATCH YOUR SEARCH</div>');
  } else if (visible > 0 && noRes) {
    noRes.remove();
  }
}

function buildCard(set) {
  var card = document.createElement('div');
  card.className = 'set-card';
  card.dataset.name  = set.name.toLowerCase();
  card.dataset.types = set.products.map(function(p){ return p.type; }).join(',');

  var headerDiv = document.createElement('div');
  headerDiv.className = 'card-header';

  var nameDiv = document.createElement('div');
  nameDiv.className = 'set-name';
  nameDiv.textContent = set.name;

  var expDiv = document.createElement('div');
  expDiv.className = 'set-most-exp';
  expDiv.innerHTML = 'Most Expensive Card: <span class="exp-val">' + fmtExp(set.most_expensive) + '</span>';

  headerDiv.appendChild(nameDiv);
  headerDiv.appendChild(expDiv);

  var productsDiv = document.createElement('div');
  productsDiv.className = 'card-products';

  set.products.forEach(function(p, idx) {
    if (idx > 0) {
      var divider = document.createElement('div');
      divider.className = 'product-divider';
      productsDiv.appendChild(divider);
    }
    var row = document.createElement('div');
    row.className = 'product-row';

    var label = document.createElement('div');
    var typeClass = 'type-' + p.type.toLowerCase();
    label.className = 'product-type-label ' + typeClass;
    label.textContent = p.type + ' Booster';

    var evsDiv = document.createElement('div');
    evsDiv.className = 'product-evs';

    var typeColorClass = 'type-' + p.type.toLowerCase();
    var packCell = document.createElement('div');
    packCell.className = 'ev-cell';
    packCell.innerHTML = '<span class="ev-cell-label">Pack EV</span><span class="ev-cell-value ' + typeColorClass + '">' + fmt(p.pack_ev) + '</span>';

    var boxCell = document.createElement('div');
    boxCell.className = 'ev-cell';
    boxCell.innerHTML = '<span class="ev-cell-label">Box EV</span><span class="ev-cell-value ' + typeColorClass + '">' + fmt(p.box_ev) + '</span>';

    evsDiv.appendChild(packCell);
    evsDiv.appendChild(boxCell);
    row.appendChild(label);
    row.appendChild(evsDiv);
    productsDiv.appendChild(row);
  });

  card.appendChild(headerDiv);
  card.appendChild(productsDiv);
  return card;
}

function renderUI(sets, fetchedAt) {
  var app = document.getElementById('appContent');

  // Build filter buttons based on available types
  var types = [];
  sets.forEach(function(s) {
    s.products.forEach(function(p) {
      if (types.indexOf(p.type) === -1) types.push(p.type);
    });
  });
  types.sort();

  var toolbar = document.createElement('div');
  toolbar.className = 'toolbar';

  var searchWrap = document.createElement('div');
  searchWrap.className = 'search-wrap';
  searchWrap.innerHTML = '<span class="search-icon">&#128269;</span><input type="text" id="searchInput" placeholder="Search sets..."/>';

  var filterBtns = document.createElement('div');
  filterBtns.className = 'filter-btns';

  ['All'].concat(types).forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === 'All' ? ' active' : '');
    btn.dataset.filter = t === 'All' ? 'all' : t;
    btn.textContent = t;
    filterBtns.appendChild(btn);
  });

  toolbar.appendChild(searchWrap);
  toolbar.appendChild(filterBtns);

  var lastUpdated = document.createElement('div');
  lastUpdated.className = 'last-updated';
  lastUpdated.innerHTML = 'Last fetched: <span>' + fetchedAt + '</span>';

  var legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML =
    '<div class="legend-item"><div class="legend-dot" style="background:#4d8ef0"></div> Play Booster</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> Collector Booster</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div> Draft Booster</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#3ecf6e"></div> Set Booster</div>';

  var grid = document.createElement('div');
  grid.className = 'sets-grid';
  grid.id = 'setsGrid';

  sets.forEach(function(set) {
    grid.appendChild(buildCard(set));
  });

  // Clear and rebuild
  app.innerHTML = '';
  app.appendChild(toolbar);
  app.appendChild(lastUpdated);
  app.appendChild(legend);
  app.appendChild(grid);

  // Wire up events
  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value.toLowerCase();
    applyFilters();
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilters();
    });
  });
}

var CACHE_KEY     = 'tedfarkass_ev_data';
var CACHE_TS_KEY  = 'tedfarkass_ev_ts';
var CACHE_TTL_MS  = 4 * 60 * 60 * 1000; // 4 hours

function loadCache() {
  try {
    var ts   = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0', 10);
    var age  = Date.now() - ts;
    if (age < CACHE_TTL_MS) {
      var raw = localStorage.getItem(CACHE_KEY);
      if (raw) return { sets: JSON.parse(raw), ts: ts, fromCache: true };
    }
  } catch(e) {}
  return null;
}

function saveCache(sets) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(sets));
    localStorage.setItem(CACHE_TS_KEY, String(Date.now()));
  } catch(e) {}
}

function formatTs(ts) {
  return new Date(ts).toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit', timeZoneName:'short'
  });
}

async function fetchEVData() {
  // Try cache first — show instantly if fresh
  var cached = loadCache();
  if (cached) {
    var cacheAge = Math.round((Date.now() - cached.ts) / 60000);
    renderUI(cached.sets, formatTs(cached.ts) + ' (cached ' + cacheAge + 'm ago)');
    return;
  }

  // No fresh cache — fetch from Sheets
  var range = encodeURIComponent(SHEET_TAB);
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + range + '?key=' + API_KEY;

  try {
    var res = await fetch(url);
    if (!res.ok) {
      var err = await res.json();
      throw new Error(err.error ? err.error.message : 'HTTP ' + res.status);
    }
    var data = await res.json();
    var rows = data.values || [];
    var sets = parseSheets(rows);

    if (!sets.length) {
      throw new Error('No sets found in sheet. Check the tab is named "MASTER EV".');
    }

    saveCache(sets);
    renderUI(sets, formatTs(Date.now()));

  } catch(err) {
    // If fetch fails but we have stale cache, show it with a warning
    var stale = loadCache();
    if (!stale) {
      try {
        var raw = localStorage.getItem(CACHE_KEY);
        if (raw) stale = { sets: JSON.parse(raw), ts: parseInt(localStorage.getItem(CACHE_TS_KEY)||'0',10) };
      } catch(e) {}
    }
    if (stale) {
      renderUI(stale.sets, formatTs(stale.ts) + ' (offline — showing cached data)');
    } else {
      document.getElementById('appContent').innerHTML =
        '<div class="error-state"><strong>Could not load EV data.</strong><br><br>' +
        err.message + '<br><br>Check that the Google Sheet is shared as "Anyone with the link can view" and the API key is valid.</div>';
    }
  }
}

fetchEVData();

</script>
